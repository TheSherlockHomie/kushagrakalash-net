{{ define "main" }}
  <article>
    <header>
      <h1>{{ .Title }}</h1>
    </header>
    {{ .Content }}
  </article>

  {{ with .Pages }}
    <ul class="post-list">
      {{ range .ByDate.Reverse }}
        <li>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
          {{ with .Date }}
            <time datetime="{{ .Format "2006-01-02" }}">{{ .Format "2 Jan 2006" }}</time>
          {{ end }}
        </li>
      {{ end }}
    </ul>
  {{ end }}
{{ end }}
